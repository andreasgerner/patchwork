---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - '*'
  resources:
  - '*'
  verbs:
  - get
  - list
  - patch
  - watch
- apiGroups:
  - patchwork.io
  resources:
  - patchrules
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - patchwork.io
  resources:
  - patchrules/finalizers
  verbs:
  - update
- apiGroups:
  - patchwork.io
  resources:
  - patchrules/status
  verbs:
  - get
  - patch
  - update
