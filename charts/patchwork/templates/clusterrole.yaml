apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "patchwork.fullname" . }}
  labels:
    {{- include "patchwork.labels" . | nindent 4 }}
rules:
  # PatchRule CRD
  - apiGroups: ["patchwork.io"]
    resources: ["patchrules"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["patchwork.io"]
    resources: ["patchrules/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["patchwork.io"]
    resources: ["patchrules/finalizers"]
    verbs: ["update"]
  # Dynamic target resources (any kind)
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "patch"]
  # Events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # Leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update"]
