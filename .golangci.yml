version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - bodyclose
    - dupl
    - errcheck
    - goconst
    - gocritic
    - gocyclo
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - misspell
    - nakedret
    - noctx
    - nolintlint
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace
  exclusions:
    rules:
      - linters:
          - dupl
          - gosec
        path: _test\.go
      - linters:
          - revive
        path: _test\.go
        text: "dot-imports"

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/andreasgerner/patchwork
